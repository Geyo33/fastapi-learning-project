services:
  data-api:
    build: ./data-api
    ports:
      - "8002:8002"
    volumes:
      - sqlite-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  client-api:
    build: ./client-api
    ports:
      - "8001:8001"
    env_file: ./client-api/.env
    environment:
      ORDERS_API_BASE_URL: http://data-api:8002/api/v1/orders
      RESTAURANTS_API_BASE_URL: http://data-api:8002/api/v1/restaurants
    depends_on:
      data-api:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "7860:7860"
    environment:
      CLIENT_API_URL: http://client-api:8001/api/v1
    depends_on:
      - client-api

  data-api-test:
    build: ./data-api
    command: pytest
    profiles: ["test"]

  client-api-test:
    build: ./client-api
    command: pytest
    profiles: ["test"]

volumes:
  sqlite-data:
